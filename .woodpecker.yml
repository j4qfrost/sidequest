when:
  - event: pull_request
  - event: push
    branch: main

# Flutter app. Pinned to stable channel; sidequest's pubspec uses
# Dart >=3.10.0 which is on stable. If we later need exact 3.40.0-1.0.pre,
# swap to a tagged image and add `flutter --version` to the matrix.


# Override the default clone step to use docker-internal Forgejo URL.
# Woodpecker rewrites repos.clone back to the public Tailscale-Serve URL on
# every webhook resync, and that URL isn't reachable from inside the docker
# bridge step containers run on. Auth uses the forgejo_user / forgejo_token
# global secrets (~/.git-credentials-snowman → Woodpecker secrets via API).
clone:
  git:
    image: alpine/git
    environment:
      FORGEJO_USER:
        from_secret: forgejo_user
      FORGEJO_TOKEN:
        from_secret: forgejo_token
    commands:
      - git init -b "${CI_COMMIT_BRANCH:-main}"
      - 'git remote add origin "http://$$FORGEJO_USER:$$FORGEJO_TOKEN@forgejo:3000/${CI_REPO}.git"'
      - 'git fetch --depth=1 origin "$$CI_COMMIT_SHA"'
      - git checkout FETCH_HEAD

steps:
  analyze-and-test:
    image: ghcr.io/cirruslabs/flutter:stable
    commands:
      - flutter pub get
      - dart run build_runner build --delete-conflicting-outputs
      - flutter analyze
      - flutter test
