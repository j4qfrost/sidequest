# .secrets.toml — committed. Contains references, not secret values.
# Render with: projects-secrets pull
# Rotate with: projects-secrets rotate <VAR>

[meta]
vault  = "Projects"
item   = "sidequest"
target = ".env"
format = "dotenv"

[vars]
FSQ_KEY        = { ref = "bw://Projects/sidequest/FSQ_KEY", rotator = "paste:foursquare" }
SERVICE_DOMAIN = { ref = "bw://Projects/sidequest/SERVICE_DOMAIN" }

[post_rotate]
note = "Flutter bundles .env at build time — run `flutter clean && flutter build` (or hot-restart `flutter run`) to pick up rotated values."
